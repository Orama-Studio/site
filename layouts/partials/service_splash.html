{{ $data := index site.Data . }} {{ with index $data 0 }}
<section class="hero mb-6 service-splash">
  <video playsinline loop muted autoplay>
    <source src="{{ .video_url }}" type="{{ .video_format }}" />
  </video>
</section>
<p class="is-size-1 is-size-3-mobile has-text-weight-extrabold condensed m-0 p-0">{{ .title }}</p>
<p class="has-text-white is-size-3 is-size-4-mobile service-subtitle lh-16">{{ .subtitle }}</p>
{{ end }}
