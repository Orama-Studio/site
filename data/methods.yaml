items:
  - title: "Metodo cinematografico"
    subtitle: "Un progetto è arte e metodo."
    image: "metodo-1.png"
    phrase: >
      Dalla regia alla post-produzione, seguiamo ogni fase con
      precisione e coerenza. Sul set e in sala di montaggio,
      ogni scelta è intenzionale: luce controllata, dettaglio
      curato, editing come linguaggio.
  - title: "Ricerca visiva"
    subtitle: "L’immagine è sostanza, non superficie."
    image: "metodo-2.png"
    phrase: >
      Lavoriamo su luce, colore e movimento per dare profondità
      a ogni produzione. Ogni inquadratura valorizza il soggetto,
      ogni sequenza ne chiarisce il senso. Ogni scelta visiva nasce
      da un’intenzione precisa, costruita in funzione del racconto.
  - title: "Identità"
    subtitle: "L’immagine è il nostro linguaggio."
    image: "metodo-3.png"
    phrase: >
      Ci piace creare contenuti che raccontano identità autentiche,
      con coerenza stilistica e profondità emotiva. Luce, suono,
      montaggio. Ogni progetto lascia una traccia riconoscibile.
